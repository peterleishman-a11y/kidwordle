<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kid Wordle">
<meta name="theme-color" content="#ffffff">
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='36' fill='%236aaa64'/><text x='90' y='128' font-size='110' text-anchor='middle' font-family='Arial Black,Arial,sans-serif' fill='white' font-weight='900'>W</text></svg>">
<title>Kid Wordle</title>
<link rel="stylesheet" href="styles.css?v=1.6">
</head>
<body>
  <div id="version">v1.6</div>
  <button id="reset-btn" aria-label="Reset game">Reset</button>

  <header>
    <h1>KID WORDLE</h1>
    <div class="sub" id="subtitle">guess the 5-letter word</div>
  </header>

  <div id="board-wrap">
    <div id="board"></div>
  </div>

  <div id="keyboard"></div>

  <div id="toast"></div>
  <div id="overlay">
    <div class="emoji" id="ov-emoji">🎉</div>
    <h2 id="ov-title">You got it!</h2>
    <div class="word" id="ov-word"></div>
    <button id="ov-btn">Play Again</button>
  </div>

  <div id="start-screen" class="screen">
    <div class="emoji">🎮</div>
    <h2>How do you want to play?</h2>
    <button class="big-btn" id="btn-random">
      🎲 Random Word
      <small>The game picks a secret word</small>
    </button>
    <button class="big-btn alt" id="btn-set">
      👥 Two Players
      <small>One player picks, the other guesses</small>
    </button>
  </div>

  <div id="confirm-word" class="screen">
    <div class="emoji">🤫</div>
    <h2>Your secret word:</h2>
    <div class="reveal" id="confirm-word-text"></div>
    <p>Is that right? Make sure Player 2 can't see!</p>
    <div class="btn-row">
      <button class="big-btn ghost" id="btn-retype">Retype</button>
      <button class="big-btn" id="btn-confirm">Yes!</button>
    </div>
  </div>

  <div id="pass-screen" class="screen">
    <div class="emoji">👀</div>
    <h2>Pass the iPad!</h2>
    <p>It's Player 2's turn to guess the secret word.</p>
    <button class="big-btn" id="btn-ready">I'm Ready!</button>
  </div>

  <div id="reset-confirm" class="screen">
    <div class="emoji">🤔</div>
    <h2>End this game?</h2>
    <p>You'll go back to the menu and start over.</p>
    <div class="btn-row">
      <button class="big-btn ghost" id="btn-cancel-reset">Keep Playing</button>
      <button class="big-btn" id="btn-yes-reset">End Game</button>
    </div>
  </div>

  <!-- Load order matters: WORDS first, then VALID_GUESSES (which uses WORDS), then game logic. -->
  <script src="words.js?v=1.6"></script>
  <script src="valid-guesses.js?v=1.6"></script>
  <script src="game.js?v=1.6"></script>
</body>
</html>
