<title>Kid Wordle</title>
<style>
  :root {
    --green: #6aaa64;
    --yellow: #c9b458;
    --gray: #787c7e;
    --key-bg: #d3d6da;
    --bg: #ffffff;
    --text: #1a1a1b;
    --border: #d3d6da;
    --border-filled: #878a8c;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    overflow: hidden;
    overscroll-behavior: none;
    -webkit-user-select: none;
    user-select: none;
    touch-action: manipulation;
  }
  body {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  header {
    text-align: center;
    padding: 10px 0 6px;
    border-bottom: 1px solid #eee;
  }
  header h1 {
    margin: 0;
    font-size: clamp(20px, 5vw, 28px);
    font-weight: 900;
    letter-spacing: 2px;
  }
  header .sub {
    font-size: 12px;
    color: #888;
    margin-top: 2px;
  }
  #board-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px;
    min-height: 0;
  }
  #board {
    display: grid;
    grid-template-rows: repeat(6, 1fr);
    gap: 6px;
    width: min(86vw, 340px);
    aspect-ratio: 5 / 6;
  }
  .row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
  }
  .tile {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(22px, 7vw, 34px);
    font-weight: 800;
    text-transform: uppercase;
    border: 2px solid var(--border);
    background: white;
    color: var(--text);
    border-radius: 6px;
    transition: transform 0.15s, background 0.3s, border-color 0.3s, color 0.3s;
  }
  .tile.filled {
    border-color: var(--border-filled);
    animation: pop 0.12s ease;
  }
  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
  }
  .tile.green  { background: var(--green);  border-color: var(--green);  color: white; }
  .tile.yellow { background: var(--yellow); border-color: var(--yellow); color: white; }
  .tile.gray   { background: var(--gray);   border-color: var(--gray);   color: white; }
  .row.shake { animation: shake 0.4s; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-8px); }
    40%, 80% { transform: translateX(8px); }
  }
  .row.bounce .tile.green,
  .row.bounce .tile { animation: bounce 0.6s; }
  @keyframes bounce {
    0% { transform: translateY(0); }
    30% { transform: translateY(-20px); }
    50% { transform: translateY(4px); }
    70% { transform: translateY(-8px); }
    100% { transform: translateY(0); }
  }
  #keyboard {
    padding: 6px 4px max(8px, env(safe-area-inset-bottom));
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .krow {
    display: flex;
    justify-content: center;
    gap: 5px;
  }
  .key {
    flex: 1;
    min-width: 0;
    max-width: 44px;
    height: 54px;
    border: none;
    border-radius: 6px;
    background: var(--key-bg);
    color: var(--text);
    font-weight: 800;
    font-size: 16px;
    text-transform: uppercase;
    cursor: pointer;
    -webkit-touch-callout: none;
    transition: background 0.2s, color 0.2s, transform 0.08s;
    font-family: inherit;
  }
  .key:active { transform: scale(0.92); }
  .key.wide {
    max-width: 70px;
    font-size: 12px;
    padding: 0 6px;
  }
  .key.green  { background: var(--green);  color: white; }
  .key.yellow { background: var(--yellow); color: white; }
  .key.gray   { background: var(--gray);   color: white; }
  #toast {
    position: fixed;
    top: 20%;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.85);
    color: white;
    padding: 12px 20px;
    border-radius: 8px;
    font-weight: 700;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.25s;
    z-index: 10;
    font-size: 16px;
  }
  #toast.show { opacity: 1; }
  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(255,255,255,0.96);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
    padding: 20px;
    z-index: 20;
  }
  #overlay.show { display: flex; }
  #overlay h2 { font-size: 32px; margin: 0 0 8px; }
  #overlay .word {
    font-size: 36px;
    font-weight: 900;
    letter-spacing: 4px;
    margin: 12px 0;
    color: var(--green);
  }
  #overlay.lose .word { color: var(--gray); }
  #overlay .emoji { font-size: 64px; margin-bottom: 8px; }
  #overlay button {
    margin-top: 20px;
    padding: 14px 32px;
    font-size: 18px;
    font-weight: 800;
    background: var(--green);
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-family: inherit;
  }
  #overlay.lose button { background: var(--gray); }
  .confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    pointer-events: none;
    z-index: 30;
    will-change: transform;
  }
</style>
</head>

let answer = "";
let currentRow = 0;
let currentGuess = "";
let gameOver = false;

const board = document.getElementById("board");
const keyboard = document.getElementById("keyboard");
const toast = document.getElementById("toast");
const overlay = document.getElementById("overlay");

function buildBoard() {
  board.innerHTML = "";
  for (let r = 0; r < 6; r++) {
    const row = document.createElement("div");
    row.className = "row";
    row.dataset.row = r;
    for (let c = 0; c < 5; c++) {
      const tile = document.createElement("div");
      tile.className = "tile";
      tile.dataset.row = r;
      tile.dataset.col = c;
      row.appendChild(tile);
    }
    board.appendChild(row);
  }
}

const KB_ROWS = [
  ["Q","W","E","R","T","Y","U","I","O","P"],
  ["A","S","D","F","G","H","J","K","L"],
  ["ENTER","Z","X","C","V","B","N","M","BACK"]
];

function buildKeyboard() {
  keyboard.innerHTML = "";
  KB_ROWS.forEach(row => {
    const r = document.createElement("div");
    r.className = "krow";
    row.forEach(k => {
      const btn = document.createElement("button");
      btn.className = "key" + (k === "ENTER" || k === "BACK" ? " wide" : "");
      btn.textContent = k === "BACK" ? "⌫" : k;
      btn.dataset.key = k;
      btn.addEventListener("click", e => {
        e.preventDefault();
        handleKey(k);
      });
      r.appendChild(btn);
    });
    keyboard.appendChild(r);
  });
}

function handleKey(k) {
  if (gameOver) return;
  if (k === "ENTER") return submitGuess();
  if (k === "BACK") {
    currentGuess = currentGuess.slice(0, -1);
    return renderCurrent();
  }
  if (/^[A-Z]$/.test(k) && currentGuess.length < 5) {
    currentGuess += k;
    renderCurrent();
  }
}

function renderCurrent() {
  const tiles = board.children[currentRow].children;
  for (let i = 0; i < 5; i++) {
    const t = tiles[i];
    const ch = currentGuess[i] || "";
    t.textContent = ch;
    t.classList.toggle("filled", !!ch);
  }
}

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add("show");
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => toast.classList.remove("show"), 1400);
}

function submitGuess() {
  if (currentGuess.length < 5) {
    showToast("Not enough letters");
    shakeRow();
    return;
  }
  if (!VALID_GUESSES.has(currentGuess)) {
    showToast("Not a word I know");
    shakeRow();
    return;
  }
  const colors = scoreGuess(currentGuess, answer);
  applyColors(colors);
  updateKeyboard(currentGuess, colors);
  const won = currentGuess === answer;
  currentRow++;
  if (won) {
    gameOver = true;
    setTimeout(() => winAnim(), 100);
    setTimeout(() => showOverlay(true), 1400);
    return;
  }
  if (currentRow >= 6) {
    gameOver = true;
    setTimeout(() => showOverlay(false), 800);
    return;
  }
  currentGuess = "";
}

function scoreGuess(guess, ans) {
  const result = ["gray","gray","gray","gray","gray"];
  const ansArr = ans.split("");
  // First pass: greens
  for (let i = 0; i < 5; i++) {
    if (guess[i] === ansArr[i]) {
      result[i] = "green";
      ansArr[i] = null;
    }
  }
  // Second pass: yellows
  for (let i = 0; i < 5; i++) {
    if (result[i] === "green") continue;
    const idx = ansArr.indexOf(guess[i]);
    if (idx !== -1) {
      result[i] = "yellow";
      ansArr[idx] = null;
    }
  }
  return result;
}

function applyColors(colors) {
  const tiles = board.children[currentRow].children;
  colors.forEach((color, i) => {
    setTimeout(() => {
      tiles[i].classList.remove("filled");
      tiles[i].classList.add(color);
    }, i * 200);
  });
}

function updateKeyboard(guess, colors) {
  const rank = { gray: 0, yellow: 1, green: 2 };
  setTimeout(() => {
    for (let i = 0; i < 5; i++) {
      const ch = guess[i];
      const btn = keyboard.querySelector(`[data-key="${ch}"]`);
      if (!btn) continue;
      const current = btn.classList.contains("green") ? "green"
        : btn.classList.contains("yellow") ? "yellow"
        : btn.classList.contains("gray") ? "gray" : null;
      if (!current || rank[colors[i]] > rank[current]) {
        btn.classList.remove("green","yellow","gray");
        btn.classList.add(colors[i]);
      }
    }
  }, 1100);
}

function shakeRow() {
  const r = board.children[currentRow];
  r.classList.add("shake");
  setTimeout(() => r.classList.remove("shake"), 400);
}

function winAnim() {
  const row = board.children[currentRow - 1];
  row.classList.add("bounce");
  fireConfetti();
}

function fireConfetti() {
  const colors = ["#6aaa64","#c9b458","#e88","#88c","#fc8","#8cf"];
  for (let i = 0; i < 60; i++) {
    const c = document.createElement("div");
    c.className = "confetti";
    c.style.background = colors[i % colors.length];
    c.style.left = (Math.random() * 100) + "vw";
    c.style.top = "-20px";
    c.style.borderRadius = Math.random() > 0.5 ? "50%" : "2px";
    document.body.appendChild(c);
    const dur = 1500 + Math.random() * 1500;
    const x = (Math.random() - 0.5) * 200;
    c.animate([
      { transform: "translate(0,0) rotate(0deg)", opacity: 1 },
      { transform: `translate(${x}px, 100vh) rotate(${Math.random()*720}deg)`, opacity: 0.9 }
    ], { duration: dur, easing: "cubic-bezier(.2,.6,.4,1)" });
    setTimeout(() => c.remove(), dur);
  }
}

function showOverlay(won) {
  const emoji = document.getElementById("ov-emoji");
  const title = document.getElementById("ov-title");
  const word = document.getElementById("ov-word");
  overlay.classList.remove("lose");
  if (won) {
    const wins = ["You got it! 🎉","Amazing! ⭐","Wordle wizard! 🧙","You did it! 🌟","Great guess! 🚀"];
    emoji.textContent = ["🎉","🌟","⭐","🎊","🏆"][Math.floor(Math.random()*5)];
    title.textContent = wins[Math.floor(Math.random()*wins.length)];
    word.textContent = answer;
  } else {
    overlay.classList.add("lose");
    emoji.textContent = "🤗";
    title.textContent = "Good try!";
    word.textContent = answer;
  }
  overlay.classList.add("show");
}

document.getElementById("ov-btn").addEventListener("click", () => {
  overlay.classList.remove("show");
  startNewGame();
});

function startNewGame() {
  answer = WORDS[Math.floor(Math.random() * WORDS.length)];
  currentRow = 0;
  currentGuess = "";
  gameOver = false;
  buildBoard();
  buildKeyboard();
}

// Hardware keyboard support (helpful for testing)
document.addEventListener("keydown", e => {
  if (gameOver) return;
  if (e.key === "Enter") handleKey("ENTER");
  else if (e.key === "Backspace") handleKey("BACK");
  else if (/^[a-zA-Z]$/.test(e.key)) handleKey(e.key.toUpperCase());
});

// Prevent pinch-zoom & double-tap zoom on iOS
document.addEventListener("gesturestart", e => e.preventDefault());
let lastTouch = 0;
document.addEventListener("touchend", e => {
  const now = Date.now();
  if (now - lastTouch <= 300) e.preventDefault();
  lastTouch = now;
}, { passive: false });

startNewGame();
</script>
